<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatGPT Assistant</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="sidepanel">
  <div class="container">
    <header>
      <div class="nav-buttons">
        <button id="resultsBtn" class="nav-btn active">Kết quả</button>
        <button id="historyBtn" class="nav-btn">Lịch sử</button>
        <button id="errorsBtn" class="nav-btn">Lỗi</button>
        <button id="settingsBtn" class="nav-btn">Cấu hình</button>
      </div>
    </header>

    <div id="resultsPage" class="page active">
      <div class="content">
        <div class="results-actions">
          <button id="runBtn" class="primary-btn">Chạy ngay</button>
          <button id="refreshBtn" class="secondary-btn">Làm mới</button>
        </div>

        <div id="resultBox" class="result-box">
          <p id="resultText" class="result-text">Chưa có kết quả. Nhấn "Chạy ngay" để bắt đầu.</p>
          <div id="loadingSpinner" class="spinner hidden"></div>
        </div>
      </div>
    </div>

    <div id="historyPage" class="page">
      <div class="content">
        <div class="page-header">
          <h2>Lịch sử Chat</h2>
          <button id="refreshHistoryBtn" class="icon-btn" title="Làm mới">🔄</button>
        </div>
        <div id="historyList" class="history-list">
          <p class="empty-state">Chưa có lịch sử. Chạy prompt để bắt đầu.</p>
        </div>
      </div>
    </div>

    <div id="errorsPage" class="page">
      <div class="content">
        <div class="page-header">
          <h2>Quản lý Lỗi</h2>
          <button id="addErrorBtn" class="primary-btn">+ Thêm lỗi</button>
        </div>
        <div id="errorList" class="error-list">
          <p class="empty-state">Chưa có lỗi được ghi nhận.</p>
        </div>
      </div>
    </div>

    <div id="settingsPage" class="page">
      <div class="content">
        <h2>Cấu hình</h2>

        <div class="form-group">
          <label for="promptInput">Prompt:</label>
          <textarea
            id="promptInput"
            class="textarea-input"
            placeholder="Nhập prompt để gửi tới ChatGPT..."
          ></textarea>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" id="autoRunCheckbox" />
            Chạy tự động (mỗi 5 phút)
          </label>
        </div>

        <div class="form-group">
          <label for="intervalInput">Khoảng thời gian (phút):</label>
          <input
            type="number"
            id="intervalInput"
            min="1"
            max="1440"
            value="5"
            class="number-input"
          />
        </div>

        <div class="button-group">
          <button id="saveBtn" class="primary-btn">Lưu cấu hình</button>
          <button id="sendBtn" class="secondary-btn">Gửi ngay</button>
          <button id="resetBtn" class="secondary-btn">Reset</button>
        </div>

        <div id="saveStatus" class="status-message"></div>
      </div>
    </div>
  </div>

  <!-- Error Modal -->
  <div id="errorModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="errorModalTitle">Thêm Lỗi</h3>
        <button class="modal-close" id="closeErrorModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="errorTitleInput">Tiêu đề lỗi:</label>
          <input type="text" id="errorTitleInput" class="text-input" placeholder="Nhập tiêu đề lỗi..." />
        </div>
        <div class="form-group">
          <label for="errorDescInput">Mô tả:</label>
          <textarea id="errorDescInput" class="textarea-input" rows="4" placeholder="Mô tả chi tiết lỗi..."></textarea>
        </div>
        <div class="form-group">
          <label for="errorTypeInput">Loại lỗi:</label>
          <select id="errorTypeInput" class="select-input">
            <option value="general">Chung</option>
            <option value="prompt">Prompt</option>
            <option value="response">Response</option>
            <option value="connection">Kết nối</option>
            <option value="timeout">Timeout</option>
          </select>
        </div>
        <div class="form-group">
          <label for="errorSeverityInput">Mức độ:</label>
          <select id="errorSeverityInput" class="select-input">
            <option value="low">Thấp</option>
            <option value="medium" selected>Trung bình</option>
            <option value="high">Cao</option>
            <option value="critical">Nghiêm trọng</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button id="saveErrorBtn" class="primary-btn">Lưu</button>
        <button id="cancelErrorBtn" class="secondary-btn">Hủy</button>
      </div>
    </div>
  </div>

  <script src="ui.js"></script>
</body>
</html>
