<!DOCTYPE html>
<html>
<head>
  <title>Test Firebase Anonymous Auth</title>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCj-87I_ixItNqk_GgjUeOKLWkcFVCMT64",
      authDomain: "myfcx51.firebaseapp.com",
      databaseURL: "https://myfcx51-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "myfcx51",
      storageBucket: "myfcx51.firebasestorage.app",
      messagingSenderId: "1061609434838",
      appId: "1:1061609434838:web:530a11dfadac7fc162a377",
      measurementId: "G-QMT32YLDK5"
    };

    const log = (msg) => {
      const output = document.getElementById('output');
      output.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${msg}</div>`;
      console.log(msg);
    };

    async function testAuth() {
      try {
        log('🔵 Initializing Firebase...');
        const app = initializeApp(firebaseConfig);
        log('✅ Firebase app initialized: ' + app.name);

        log('🔵 Getting Auth instance...');
        const auth = getAuth(app);
        log('✅ Auth instance created');

        log('🔵 Setting up auth state listener...');
        onAuthStateChanged(auth, (user) => {
          if (user) {
            log('✅ AUTH STATE: User logged in: ' + user.uid);
          } else {
            log('⚠️ AUTH STATE: No user logged in');
          }
        });

        log('🔵 Attempting anonymous sign-in...');
        const userCredential = await signInAnonymously(auth);
        log('✅ SUCCESS! Anonymous auth working!');
        log('✅ User UID: ' + userCredential.user.uid);
        log('✅ User isAnonymous: ' + userCredential.user.isAnonymous);
        
      } catch (error) {
        log('❌ ERROR: ' + error.code);
        log('❌ Message: ' + error.message);
        
        if (error.code === 'auth/configuration-not-found') {
          log('⚠️ SOLUTION: Enable Anonymous Authentication in Firebase Console!');
          log('⚠️ Go to: https://console.firebase.google.com/project/myfcx51/authentication/providers');
        }
      }
    }

    window.addEventListener('load', () => {
      testAuth();
    });
  </script>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background: #1e1e1e;
      color: #d4d4d4;
    }
    #output {
      background: #252526;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #3e3e42;
    }
    #output div {
      padding: 5px 0;
      border-bottom: 1px solid #3e3e42;
    }
    h1 {
      color: #4ec9b0;
    }
  </style>
</head>
<body>
  <h1>Firebase Anonymous Auth Test</h1>
  <p>This page tests if Anonymous Authentication is enabled in your Firebase project.</p>
  <div id="output"></div>
</body>
</html>
