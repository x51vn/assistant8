name: Quality Baseline

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - baseline/**

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Repository hygiene
        run: npm run check:repo-hygiene

      - name: Build extension
        run: npm run build

      - name: Unit tests
        run: npm run test:unit:run

      - name: OpenSpec validation
        run: npm run check:openspec

      - name: Extension smoke check
        run: npm run smoke:extension
